name: Publish to crates.io

on:
  push:
    tags:
      - 'winisland-plugin-api-v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Parse crate name and version from tag
        id: parse
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          # e.g. winisland-plugin-api-v0.2.0 → package=winisland-plugin-api, version=0.2.0
          PACKAGE="${REF_NAME%-v*}"
          VERSION="${REF_NAME##*-v}"
          echo "package=$PACKAGE" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Verify version matches Cargo.toml
        shell: bash
        env:
          PKG: ${{ steps.parse.outputs.package }}
          EXPECTED: ${{ steps.parse.outputs.version }}
        run: |
          FOUND=$(cargo metadata --format-version 1 --no-deps | \
            python3 -c "import sys,json,os; data=json.load(sys.stdin); \
            pkg=[p for p in data['packages'] if p['name']==os.environ['PKG']][0]; print(pkg['version'])")
          if [ "$FOUND" != "$EXPECTED" ]; then
            echo "Version mismatch: tag says $EXPECTED, Cargo.toml says $FOUND"
            exit 1
          fi
          echo "Version $FOUND verified"

      - name: Publish
        run: cargo publish -p "${{ steps.parse.outputs.package }}"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
