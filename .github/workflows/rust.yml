name: Rust Build

on:
  push:
    branches: [ "master", "main" ]
    paths-ignore:
      - 'Docs/**/*.md'
      - '*.md'
      - '.github/**'
      - '.ai/**'
      - '.agents/**'
      - 'AGENTS.md'
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-rust:
    if: ${{ !contains(github.event.head_commit.message, '[ci-skip]') && !contains(github.event.head_commit.message, '[docs]') }}
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
    - name: Rust Cache
      uses: swatinem/rust-cache@v2
    - name: Install dependencies
      run: |
        choco install ninja
    - name: Build Release
      run: cargo build --release --verbose
    - name: Generate Version Info
      run: |
        $date = (Get-Date).ToUniversalTime().AddHours(8).ToString("yyyy-MM-dd HH:mm:ss")
        $json = @{ timestamp = $date } | ConvertTo-Json
        $json | Out-File -FilePath target/release/version_info.json -Encoding utf8
    - name: Delete Old Nightly Release
      run: |
        gh release delete nightly --yes --cleanup-tag
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      continue-on-error: true
    - name: Upload Nightly Release
      uses: softprops/action-gh-release@v2
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      with:
        tag_name: nightly
        name: Nightly Build
        draft: false
        prerelease: true
        files: |
          target/release/WinIsland.exe
          target/release/version_info.json
        make_latest: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
