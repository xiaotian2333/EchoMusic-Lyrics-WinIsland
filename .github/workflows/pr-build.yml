name: PR Build & Test

on:
  pull_request:
    branches: [ "master", "main" ]
    paths-ignore:
      - 'Docs/**/*.md'
      - '*.md'
      - '.github/**'
      - '.ai/**'
      - '.agents/**'
      - 'AGENTS.md'

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    if: ${{ !contains(github.event.pull_request.title, '[ci-skip]') && !contains(github.event.pull_request.title, '[docs]') }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-npm
        with:
          path: settings-ui/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('settings-ui/package-lock.json') }}

      - name: Install frontend dependencies
        if: steps.cache-npm.outputs.cache-hit != 'true'
        run: cd settings-ui && npm install

      - name: Build frontend
        run: cd settings-ui && npm run build

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2

      - name: Install dependencies
        run: choco install ninja

      - name: Build (release)
        run: cargo build --release --verbose

      - name: Run tests
        run: cargo test --verbose
